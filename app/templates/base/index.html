{{define "title"}}FluxRPG Spell Book{{end}}


{{ define "header" }}

    Spell List: A prettier header will come later
  </div>
</div>
<div class="row">
  <div class="row">
    <div class="sixteen columns header_bottom">
      Schools: {{ if .Authenticated }}<a href="/addschool/">Add New School</a>{{end}}
    </div>
  </div>
  <div class="sixteen columns header_bottom">&nbsp;
    {{ range .Schools }}
      &nbsp;<div class="schoolname"><a href="">{{.Name}}</a></div>&nbsp;
    {{end}}
  </div>
</div>
<div class="row header_bottom">
  <div class="sixteen columns">
    Categories go Here
  </div>
</div>
{{ end }}
